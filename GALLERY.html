<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, 'Times New Roman', serif;
}

body{
    background:#000;
    color:white;
}

/* NAVBAR */
header{
    background:#111;
    padding:15px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:18px;
    font-weight:bold;
}

nav a{
    text-decoration:none;
    color:white;
    margin-left:20px;
    font-size:14px;
    transition:0.3s;
}

nav a:hover{
    color:#ff69b4;
}

/* GALLERY HERO */
.gallery-hero{
    padding:50px;
    text-align:center;
    background: linear-gradient(
        to right,
        #ff9a9e,
        #fecfef,
        #fcb69f
    );
}

.gallery-hero h1{
    font-size:40px;
    margin-bottom:20px;
}

/* GALLERY GRID */
.gallery-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:15px;
    padding:40px;
}

.gallery-grid img{
    width:200%;
    height:290px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.gallery-grid img:hover{
    transform:scale(1.05);
}

.gallery-grid img{
    width:100%;
    border-radius:10px;
    box-shadow:0 0 20px rgba(255,105,180,0.6);
    transition: transform 0.3s, box-shadow 0.3s;
}

.gallery-grid img:hover{
    transform: scale(1.05);
    box-shadow:0 0 30px rgba(255,105,180,0.9);
}

/* RESPONSIVE */
@media(max-width:600px){
    .gallery-hero h1{
        font-size:32px;
    }
}
</style>
</head>
